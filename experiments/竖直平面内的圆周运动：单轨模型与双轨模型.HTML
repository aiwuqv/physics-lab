<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竖直面内圆周运动 · 单轨模型 vs 双轨模型</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0e2e42, #1f5270);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            margin: 0;
        }
        .card {
            max-width: 1400px;
            width: 100%;
            background: rgba(245, 250, 255, 0.95);
            backdrop-filter: blur(6px);
            border-radius: 48px;
            box-shadow: 0 25px 50px rgba(0, 10, 30, 0.7);
            padding: 25px;
            border: 2px solid rgba(255, 255, 255, 0.7);
        }
        h1 {
            font-size: 2.3rem;
            margin: 0 0 5px 0;
            color: #013853;
        }
        .sub {
            color: #1f5b7e;
            margin-bottom: 20px;
            font-style: italic;
            background: #d4edff;
            display: inline-block;
            padding: 5px 25px;
            border-radius: 40px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        /* 控制面板 */
        .control-panel {
            background: #e4f1fc;
            border-radius: 40px;
            padding: 20px 15px;
            box-shadow: inset 0 2px 6px #ffffff, 0 10px 20px #153c55;
            border: 1px solid white;
        }
        .control-panel h3 {
            margin: 0 0 15px 0;
            color: #0d4163;
            font-size: 1.6rem;
            border-bottom: 3px solid #b8d6f0;
        }
        .model-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #c4dff7;
            border-radius: 50px;
            padding: 5px;
        }
        .model-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #013e63;
            cursor: pointer;
            transition: 0.1s;
        }
        .model-btn.active {
            background: white;
            box-shadow: 0 4px 8px #2d6692;
        }
        .slider-group {
            margin-bottom: 18px;
        }
        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #0d4a70;
        }
        .value-badge {
            background: #236696;
            color: white;
            padding: 3px 14px;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
        }
        input[type=range] {
            width: 100%;
            height: 6px;
            background: #8eb9da;
            border-radius: 10px;
            -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #f0a55a;
            border-radius: 50%;
            box-shadow: 0 2px 6px #0a2a40;
            border: 2px solid white;
            cursor: pointer;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            margin: 20px 0 10px;
        }
        .btn {
            flex: 1;
            background: #f0f7ff;
            border: none;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #004b7a;
            box-shadow: 0 5px 0 #3f779b, 0 8px 16px #0b2b3d;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #3f779b, 0 6px 12px #0b2b3d;
        }
        .btn.reset {
            background: #ffdec2;
            color: #6a3a12;
        }
        .info-text {
            background: #d3e6fc;
            border-radius: 30px;
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
        }
        /* 动画区 */
        .canvas-area {
            background: #d2e8fc;
            border-radius: 40px;
            padding: 15px;
            box-shadow: inset 0 -4px 10px #92b6d0, 0 16px 24px #0f364b;
            border: 2px solid white;
        }
        .main-canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #c4e0fa;
            border-radius: 32px;
            box-shadow: 0 0 0 3px #a2c2df;
        }
        .data-panel {
            background: #e2f0fa;
            border-radius: 36px;
            padding: 15px;
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            border: 1px solid white;
        }
        .data-item {
            background: #ffffffd0;
            border-radius: 40px;
            padding: 10px 5px;
            text-align: center;
            font-weight: 600;
            color: #003b61;
            box-shadow: inset 0 1px 5px #c0dfff;
        }
        .data-item span {
            font-family: 'Courier New', monospace;
            background: #174d74;
            color: #fbf0c0;
            padding: 4px 12px;
            border-radius: 30px;
            margin-left: 5px;
        }
        .status-wide {
            grid-column: span 4;
            background: #ffeec2;
            border-radius: 40px;
            padding: 10px;
            text-align: center;
            font-weight: 600;
            border: 2px solid #c4a05a;
        }
        /* 图像区 */
        .graph-area {
            background: #e2f0fa;
            border-radius: 36px;
            padding: 15px;
            margin-top: 20px;
        }
        .graph-area h3 {
            margin: 0 0 10px 15px;
            color: #024267;
        }
        .graph-wrapper {
            position: relative;
            height: 180px;
            width: 100%;
        }
        .graph-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 0.9rem;
            color: #015789;
        }
        /* 结论区（无实验结论，保留空白或移除） */
        .conclusion-placeholder {
            height: 20px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div id="top-nav" style="
    position: fixed;
    top: 0;

    height: 50px;

">
    <button onclick="location.href='../index.html'" style="
        background: rgba(255,255,255,0.2);

        cursor: pointer;

    " onmouseover="this.style.background='rgba(255,255,255,0.4)'" 
      onmouseout="this.style.background='rgba(255,255,255,0.2)'">🏠 主页</button>

    <button onclick="history.back()" style="
        background: rgba(255,255,255,0.2);

      onmouseout="this.style.background='rgba(255,255,255,0.2)'">⬅ 返回上级</button>
</div>
<div style="height: 60px;"></div>
<!-- ===== 导航栏结束 ===== -->

<div class="card">
    <h1>⚡ 竖直面内圆周运动 —— 单轨模型 vs 双轨模型</h1>
    <div class="sub">单轨(等效绳) · 双轨(等效杆) · F-v²图 · 内外轨区分</div>

    <div class="dashboard">
        <!-- 左侧控制面板 -->
        <div class="control-panel">
            <h3>⚙️ 控制面板</h3>
            <div class="model-switch" id="modelSwitch">
                <button class="model-btn active" id="singleRailBtn">⭕ 单轨模型</button>
                <button class="model-btn" id="doubleRailBtn">⏺️ 双轨模型</button>
            </div>
            <div class="slider-group">
                <label>质量 m <span class="value-badge" id="massDisplay">1.0 kg</span></label>
                <input type="range" id="massSlider" min="0.1" max="5.0" value="1.0" step="0.1">
            </div>
            <div class="slider-group">
                <label>半径 R <span class="value-badge" id="radiusDisplay">1.5 m</span></label>
                <input type="range" id="radiusSlider" min="0.5" max="3.0" value="1.5" step="0.05">
            </div>
            <div class="slider-group">
                <label>初速度 v₀ <span class="value-badge" id="v0Display">5.0 m/s</span></label>
                <input type="range" id="v0Slider" min="0.0" max="10.0" value="5.0" step="0.2">
            </div>
            <div class="action-buttons">
                <button class="btn" id="startBtn">▶ 开始</button>
                <button class="btn" id="pauseBtn">⏸️ 暂停</button>
                <button class="btn reset" id="resetBtn">↺ 重置</button>
            </div>
            <div class="info-text">
                <span>临界速度 √(gR) = <span id="critGRSpan">3.83</span> m/s</span><br>
                <span>重力加速度 g = 9.8 m/s² (固定)</span>
            </div>
        </div>

        <!-- 右侧动画区 + 数据 -->
        <div class="canvas-area">
            <canvas id="mainCanvas" width="700" height="380" class="main-canvas"></canvas>
            <div class="data-panel" id="dataPanel">
                <div class="data-item">模型 <span id="modelName">单轨</span></div>
                <div class="data-item">速度 v <span id="speedVal">0.00</span></div>
                <div class="data-item">支持力 F <span id="forceVal">0.00</span></div>
                <div class="data-item">向心力 Fn <span id="centripetalVal">0.00</span></div>
                <div class="data-item">临界 v_min <span id="vminVal">0.00</span></div>
                <div class="data-item">角度 θ <span id="thetaVal">0°</span></div>
                <div class="status-wide" id="statusMsg">⚪ 最低点 A (静止)</div>
            </div>
        </div>
    </div>

    <!-- 下方 F-v² 关系图 -->
    <div class="graph-area">
        <h3>📈 F - v² 关系 (斜率为 m/R, 内外轨区分)</h3>
        <div class="graph-wrapper">
            <canvas id="fvChart"></canvas>
        </div>
        <div class="graph-labels">
            <span>🟢 外轨作用 (F>0)</span>
            <span>🟠 内轨作用 (F<0) —— 仅双轨</span>
            <span>⚫ 单轨有效区 F≥0</span>
        </div>
    </div>

    <!-- 无实验结论，保留一个空行 -->
    <div class="conclusion-placeholder"></div>
</div>

<script>
(function() {
    // --- 常量与元素 ---
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const width = canvas.width, height = canvas.height;
    const centerX = 350, centerY = 200;          // 圆心 (像素)
    const g = 9.8;                                // 重力加速度固定

    // 滑块
    const massSlider = document.getElementById('massSlider');
    const radiusSlider = document.getElementById('radiusSlider');
    const v0Slider = document.getElementById('v0Slider');
    const massDisplay = document.getElementById('massDisplay');
    const radiusDisplay = document.getElementById('radiusDisplay');
    const v0Display = document.getElementById('v0Display');
    const critGRSpan = document.getElementById('critGRSpan');

    // 数据展示
    const modelName = document.getElementById('modelName');
    const speedVal = document.getElementById('speedVal');
    const forceVal = document.getElementById('forceVal');
    const centripetalVal = document.getElementById('centripetalVal');
    const vminVal = document.getElementById('vminVal');
    const thetaVal = document.getElementById('thetaVal');
    const statusMsg = document.getElementById('statusMsg');

    // 按钮
    const singleBtn = document.getElementById('singleRailBtn');
    const doubleBtn = document.getElementById('doubleRailBtn');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 图表
    const chartCtx = document.getElementById('fvChart').getContext('2d');
    let fvChart;

    // --- 可调参数 ---
    let m = 1.0, R = 1.5, v0 = 5.0;
    let isSingle = true;          // true=单轨, false=双轨

    // --- 运动状态 ---
    let theta = 0.0;            // 弧度, 0=最低点
    let omega = 0.0;            // 角速度 (rad/s)
    let direction = 1;          // 1逆时针, -1顺时针
    let paused = false;
    let animFrame = null;
    let animActive = true;

    // 比例尺: 1米 = 90像素
    const pxPerM = 90;

    // --- 更新滑块显示 ---
    function updateSliderReadout() {
        m = parseFloat(massSlider.value);
        R = parseFloat(radiusSlider.value);
        v0 = parseFloat(v0Slider.value);
        massDisplay.innerText = m.toFixed(1) + ' kg';
        radiusDisplay.innerText = R.toFixed(2) + ' m';
        v0Display.innerText = v0.toFixed(1) + ' m/s';
        const crit = Math.sqrt(g * R).toFixed(2);
        critGRSpan.innerText = crit;
    }

    // --- 根据机械能计算当前速度 (最低点势能0) ---
    function getCurrentSpeed() {
        let vSq = v0 * v0 - 2 * g * R * (1 - Math.cos(theta));
        if (vSq < 0) vSq = 0;
        return Math.sqrt(vSq);
    }

    // --- 计算支持力 (指向圆心为正, 背离圆心为负) ---
    function computeForce(v) {
        // 通用公式 F = m v^2/R + mg cosθ
        return m * v * v / R + m * g * Math.cos(theta);
    }

    // --- 临界速度 (当前角度) 仅用于单轨模型判断脱离 ---
    function criticalSpeedAtTheta() {
        return Math.sqrt(g * R * Math.cos(theta));
    }

    // --- 更新数据区 ---
    function updateData() {
        let v = getCurrentSpeed();
        let force = computeForce(v);
        let vCrit = isSingle ? criticalSpeedAtTheta() : 0;
        let thetaDeg = (theta * 180 / Math.PI).toFixed(0);
        speedVal.innerText = v.toFixed(2);
        forceVal.innerText = force.toFixed(2);
        centripetalVal.innerText = (m * v * v / R).toFixed(2);
        vminVal.innerText = isSingle ? vCrit.toFixed(2) : '0.00';
        thetaVal.innerText = thetaDeg + '°';

        // 状态文字
        let modelText = isSingle ? '单轨' : '双轨';
        modelName.innerText = modelText;

        let pos = '';
        if (Math.abs(theta) < 0.05 || Math.abs(theta - 2*Math.PI) < 0.05) pos = '最低点 A';
        else if (Math.abs(theta - Math.PI) < 0.05) pos = '最高点 B';
        else pos = '任意点 E';

        let extra = '';
        if (isSingle) {
            // 单轨模型: 检查能否通过当前点
            if (v < vCrit && direction > 0 && theta < Math.PI) extra = ' ⚠️ 速度不足，将脱离';
            else if (force < -0.1) extra = ' ⚠️ 需要内轨支持 (单轨无法提供)';
            else extra = ' 运动中';
        } else {
            if (force > 0) extra = ' (外轨作用)';
            else if (force < 0) extra = ' (内轨作用)';
            else extra = ' (零力)';
        }
        statusMsg.innerText = pos + extra;

        // 更新图表点
        updateFVChart(v*v, force);
    }

    // --- 绘制轨道、小球、受力箭头 ---
    function drawScene() {
        ctx.clearRect(0, 0, width, height);

        // 背景
        ctx.fillStyle = '#d2eaff';
        ctx.fillRect(0, 0, width, height);

        // 轨道
        ctx.setLineDash([]);
        if (isSingle) {
            // 单轨: 一条实线
            ctx.beginPath();
            ctx.arc(centerX, centerY, R * pxPerM, 0, 2 * Math.PI);
            ctx.strokeStyle = '#5f7f9f';
            ctx.lineWidth = 3;
            ctx.stroke();
        } else {
            // 双轨: 外轨实线, 内轨虚线
            ctx.beginPath();
            ctx.arc(centerX, centerY, R * pxPerM, 0, 2 * Math.PI);
            ctx.strokeStyle = '#4f7a9e';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(centerX, centerY, R * pxPerM - 8, 0, 2 * Math.PI);
            ctx.strokeStyle = '#b5712f';
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // 标注A、B
        ctx.font = 'bold 16px "Segoe UI"';
        ctx.fillStyle = '#01447e';
        ctx.fillText('A', centerX-20, centerY + R*pxPerM + 20);
        ctx.fillText('B', centerX-20, centerY - R*pxPerM - 10);

        // 小球位置
        let ballX = centerX + R * pxPerM * Math.sin(theta);
        let ballY = centerY - R * pxPerM * Math.cos(theta);

        // 画小球
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#1e4b6b';
        ctx.beginPath();
        ctx.arc(ballX, ballY, 12, 0, 2*Math.PI);
        ctx.fillStyle = '#f5a23d';
        ctx.fill();
        ctx.shadowBlur = 6;
        ctx.fillStyle = '#ffd966';
        ctx.beginPath();
        ctx.arc(ballX-2, ballY-2, 8, 0, 2*Math.PI);
        ctx.fill();
        ctx.shadowBlur = 0;

        // 重力箭头 (红色)
        let v = getCurrentSpeed();
        let force = computeForce(v);
        ctx.beginPath();
        ctx.strokeStyle = '#c62828';
        ctx.lineWidth = 2;
        ctx.moveTo(ballX, ballY);
        ctx.lineTo(ballX, ballY + m*g*6);
        ctx.stroke();
        ctx.fillStyle = '#c62828';
        ctx.beginPath();
        ctx.moveTo(ballX, ballY + m*g*6);
        ctx.lineTo(ballX - 5, ballY + m*g*6 - 10);
        ctx.lineTo(ballX + 5, ballY + m*g*6 - 10);
        ctx.fill();

        // 支持力箭头
        if (Math.abs(force) > 0.01) {
            let forceDir = force > 0 ? 1 : -1; // 正:指向圆心(外轨), 负:背离圆心(内轨)
            let arrowLen = Math.abs(force) * 4;
            let endX = ballX + forceDir * (centerX - ballX) / (R*pxPerM) * arrowLen;
            let endY = ballY + forceDir * (centerY - ballY) / (R*pxPerM) * arrowLen;
            ctx.beginPath();
            ctx.strokeStyle = force > 0 ? '#2e7d32' : '#ed820e'; // 绿:外轨, 橙:内轨
            ctx.lineWidth = 2;
            ctx.moveTo(ballX, ballY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            ctx.fillStyle = force > 0 ? '#2e7d32' : '#ed820e';
            let a = Math.atan2(endY - ballY, endX - ballX);
            let arrowX = endX - 10 * Math.cos(a);
            let arrowY = endY - 10 * Math.sin(a);
            ctx.beginPath();
            ctx.moveTo(endX, endY);
            ctx.lineTo(arrowX - 5 * Math.sin(a), arrowY + 5 * Math.cos(a));
            ctx.lineTo(arrowX + 5 * Math.sin(a), arrowY - 5 * Math.cos(a));
            ctx.fill();
        }
    }

    // --- 物理更新 ---
    function update() {
        if (paused) return;

        let v = getCurrentSpeed();
        let vCrit = isSingle ? criticalSpeedAtTheta() : 0;

        // 单轨模型特殊处理：上升中速度不足则反转(模拟脱离)
        if (isSingle && v < vCrit && direction > 0 && theta < Math.PI) {
            direction = -1;
        }

        // 角速度
        omega = v / R;
        let dt = 0.025;
        theta += direction * omega * dt;

        // 角度归一化
        if (theta > 2*Math.PI) theta -= 2*Math.PI;
        if (theta < 0) theta += 2*Math.PI;

        // 防止在最高点附近卡死 (单轨)
        if (isSingle && v < 0.05 && theta > Math.PI - 0.1 && theta < Math.PI + 0.1) {
            direction = -1;
        }

        updateData();
        drawScene();
    }

    // --- 动画循环 ---
    function animate() {
        update();
        animFrame = requestAnimationFrame(animate);
    }

    // --- 图表初始化与更新 ---
    function initChart() {
        fvChart = new Chart(chartCtx, {
            type: 'scatter',
            data: {
                datasets: [
                    { label: '理论线 (最低点)', data: [], borderColor: '#3b7ca3', backgroundColor: 'transparent', showLine: true, tension: 0, pointRadius: 0, borderWidth: 1, borderDash: [5,5] },
                    { label: '理论线 (最高点)', data: [], borderColor: '#d45d1e', backgroundColor: 'transparent', showLine: true, tension: 0, pointRadius: 0, borderWidth: 2 },
                    { label: '当前点', data: [], borderColor: '#000', backgroundColor: '#c44b3c', pointRadius: 6, type: 'scatter' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: { title: { display: true, text: 'v² (m²/s²)' }, beginAtZero: true },
                    y: { title: { display: true, text: 'F (N)' } }
                },
                plugins: {
                    tooltip: { enabled: false }
                }
            }
        });
    }

    function updateFVChart(vSq, F) {
        if (!fvChart) return;
        let maxVSq = Math.max(100, v0*v0 + 10);
        // 最低点理论线: F = (m/R)v² + mg
        let dataLow = [];
        // 最高点理论线: F = (m/R)v² - mg
        let dataHigh = [];
        for (let x = 0; x <= maxVSq; x += 2) {
            dataLow.push({ x: x, y: (m/R)*x + m*g });
            dataHigh.push({ x: x, y: (m/R)*x - m*g });
        }
        fvChart.data.datasets[0].data = dataLow;
        fvChart.data.datasets[1].data = dataHigh;
        fvChart.data.datasets[2].data = [{ x: vSq, y: F }];
        fvChart.update();
    }

    // --- 重置到最低点，速度为v0 ---
    function resetToStart() {
        theta = 0.0;
        direction = 1;
        paused = false;
        startBtn.disabled = false;
        pauseBtn.disabled = false;
        updateData();
        drawScene();
    }

    // --- 滑块改变 ---
    function slidersChanged() {
        updateSliderReadout();
        resetToStart();
        let v = getCurrentSpeed();
        let F = computeForce(v);
        updateFVChart(v*v, F);
    }

    // --- 事件绑定 ---
    massSlider.addEventListener('input', slidersChanged);
    radiusSlider.addEventListener('input', slidersChanged);
    v0Slider.addEventListener('input', slidersChanged);

    singleBtn.addEventListener('click', () => {
        isSingle = true;
        singleBtn.classList.add('active');
        doubleBtn.classList.remove('active');
        resetToStart();
    });
    doubleBtn.addEventListener('click', () => {
        isSingle = false;
        doubleBtn.classList.add('active');
        singleBtn.classList.remove('active');
        resetToStart();
    });

    startBtn.addEventListener('click', () => {
        paused = false;
    });

    pauseBtn.addEventListener('click', () => {
        paused = true;
    });

    resetBtn.addEventListener('click', () => {
        resetToStart();
        paused = false;
    });

    // --- 初始化 ---
    updateSliderReadout();
    initChart();
    resetToStart();
    animFrame = requestAnimationFrame(animate);
})();
</script>
</body>
</html>
