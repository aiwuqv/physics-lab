    <!-- Chart.js 轻量图表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f5f9ff 0%, #e3ecf7 100%);
            min-height: 100vh;

        .card {

        }
        h1 {
            margin: 0 0 6px 0;

        }
        /* 图像区 双图并排 */
        .graph-row {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin: 30px 0 25px;
        }
        .graph-container {
            flex: 1 1 400px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            border-radius: 36px;
            padding: 20px 20px 15px 20px;
            box-shadow: 0 10px 20px rgba(38, 55, 90, 0.2);
            border: 1px solid rgba(255,255,255,0.9);

        }
        .footnote {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚛️ 牛顿第二定律 · 探究实验</h1>
    <div class="sub">加速度与合外力、质量的定量关系 —— 控制变量法 · 实时拟合</div>

    <div class="dashboard">
        <!-- 左侧控制面板 -->
        <div class="control-panel">
            <h3>⚙️ 控制变量</h3>
            <div class="slider-group">
                <label>小车质量 <span class="value-badge" id="massValue">1.00 kg</span></label>
                <input type="range" id="massSlider" min="0.5" max="2.5" value="1.0" step="0.05">
            </div>
            <div class="slider-group">
                <label>砝码质量 <span class="value-badge" id="weightValue">0.20 kg</span></label>
                <input type="range" id="weightSlider" min="0.1" max="1.2" value="0.2" step="0.02">
            </div>
            <div class="slider-group">
                <label>摩擦系数 <span class="value-badge" id="frictionValue">0.10</span></label>
                <input type="range" id="frictionSlider" min="0.0" max="0.5" value="0.1" step="0.01">
            </div>
            <div class="button-group">
                <button class="btn" id="startBtn">▶ 开始运动</button>
                <button class="btn primary" id="plotBtn">📸 绘图记录</button>
                <button class="btn" id="resetBtn">↺ 重置</button>
            </div>
            <div style="font-size:0.85rem; color:#2b4f73; margin-top:15px; background:#ebf3fa; border-radius:28px; padding:12px; text-align:center;">
                <strong>操作提示：</strong><br>调整滑块改变参数，点击“绘图”记录当前点；多次记录生成拟合直线。
            </div>
        </div>

        <!-- 动画区 + 实时数据 -->
        <div class="animation-area">
            <canvas id="labCanvas" width="700" height="190"></canvas>
            <div class="data-row">
                <div class="data-item">加速度 a <span id="dispA">0.00</span> m/s²</div>
                <div class="data-item">拉力 F <span id="dispF">1.96</span> N</div>
                <div class="data-item">质量 M <span id="dispM">1.00</span> kg</div>
            </div>
        </div>
    </div>

    <!-- 图像区: a-F 和 a-1/m 双图 -->
    <div class="graph-row">
        <div class="graph-container">
            <h3>📈 a-F 图像 (质量不变时)</h3>
            <div class="graph-wrapper">
                <canvas id="chartAF"></canvas>
            </div>
            <div class="formula-text" id="afFormula">暂无数据</div>
        </div>
        <div class="graph-container">
            <h3>📊 a-1/m 图像 (外力不变时)</h3>
            <div class="graph-wrapper">
                <canvas id="chartInvM"></canvas>
            </div>
            <div class="formula-text" id="invMFormula">暂无数据</div>
        </div>
    </div>

    <!-- 底部结论 -->
    <div class="conclusion">
        <h3>🔬 实验结论 · 牛顿第二定律</h3>
        <div class="footnote">
            <p>✓ 物体加速度与合外力成正比，与质量成反比。</p>
            <p>✓ 满足牛顿第二定律：F合 = m a</p>
            <p>✓ a-F 图像为过原点直线，a-1/m 图像为过原点直线。</p>
        </div>
    </div>
</div>

<script>
(function() {
    // --- 物理常量 & 全局变量 ---
    const g = 9.8;               // 重力加速度 m/s²

    // DOM 元素
    const massSlider = document.getElementById('massSlider');
    const weightSlider = document.getElementById('weightSlider');
    const frictionSlider = document.getElementById('frictionSlider');
    const massVal = document.getElementById('massValue');
    const weightVal = document.getElementById('weightValue');
    const frictionVal = document.getElementById('frictionValue');
    const dispA = document.getElementById('dispA');
    const dispF = document.getElementById('dispF');
    const dispM = document.getElementById('dispM');

    const startBtn = document.getElementById('startBtn');
    const plotBtn = document.getElementById('plotBtn');
    const resetBtn = document.getElementById('resetBtn');

    const canvas = document.getElementById('labCanvas');
    const ctx = canvas.getContext('2d');

    // 数据存储 (多次实验对比)
    let dataAF = [];            // {x: F, y: a}
    let dataInvM = [];          // {x: 1/M, y: a}

    // 图表实例
    let chartAF, chartInvM;

    // 动画相关
    let animFrame = null;
    let animActive = false;
    let carX = 60;               // 小车初始x (像素)
    let carV = 0;                // 速度 m/s (与实际物理成比例, 但仅用于动画)
    const PIXEL_PER_METER = 40;   // 动画缩放: 1m = 40px
    const MAX_X = 620;            // 右边界 (canvas.width - 80)
    const MIN_X = 40;             // 左边界

    // --- 辅助函数: 根据滑块计算当前物理量 ---
    function getCurrentParams() {
        const M = parseFloat(massSlider.value);
        const m = parseFloat(weightSlider.value);
        const mu = parseFloat(frictionSlider.value);

        // 拉力 (砝码重力) F = m * g
        const F = m * g;
        // 摩擦力 f = mu * M * g
        const friction = mu * M * g;
        // 合外力 = F - friction (保证非负)
        let netForce = F - friction;
        if (netForce < 0) netForce = 0;
        const a = netForce / M;   // 加速度

        return { M, m, mu, F, friction, netForce, a };
    }

    // 更新数据显示 (滑块变动时调用)
    function updateDataDisplay() {
        const { M, m, mu, F, a } = getCurrentParams();
        massVal.innerText = M.toFixed(2) + ' kg';
        weightVal.innerText = m.toFixed(2) + ' kg';
        frictionVal.innerText = mu.toFixed(2);
        dispA.innerText = a.toFixed(2);
        dispF.innerText = F.toFixed(2);
        dispM.innerText = M.toFixed(2);
        return { M, m, F, a };
    }

    // --- 线性回归 (返回斜率/截距, 需至少2点) ---
    function linearRegression(points) {
        const n = points.length;
        if (n < 2) return null;
        let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
        for (let p of points) {
            sumX += p.x;
            sumY += p.y;
            sumXY += p.x * p.y;
            sumX2 += p.x * p.x;
        }
        const denominator = n * sumX2 - sumX * sumX;
        if (Math.abs(denominator) < 1e-9) return null; // 防止除零
        const slope = (n * sumXY - sumX * sumY) / denominator;
        const intercept = (sumY - slope * sumX) / n;
        return { slope, intercept };
    }

    // 更新两个图表 (数据和拟合直线)
    function updateCharts() {
        // 1. 更新 a-F 图表
        let afPoints = dataAF.map(p => ({ x: p.x, y: p.y }));
        let afLineData = [];
        const regAF = linearRegression(dataAF);
        if (regAF && dataAF.length >= 2) {
            const xs = dataAF.map(p => p.x);
            const minX = Math.min(...xs);
            const maxX = Math.max(...xs);
            const pad = (maxX - minX) * 0.1 || 0.5;
            const x1 = Math.max(0, minX - pad);
            const x2 = maxX + pad;
            afLineData = [
                { x: x1, y: regAF.slope * x1 + regAF.intercept },
                { x: x2, y: regAF.slope * x2 + regAF.intercept }
            ];
            document.getElementById('afFormula').innerHTML = 
                `拟合: a = ${regAF.slope.toFixed(3)} F + ${regAF.intercept.toFixed(3)}`;
        } else {
            document.getElementById('afFormula').innerHTML = '暂无数据或点太少';
        }

        chartAF.data.datasets[0].data = afPoints;
        chartAF.data.datasets[1].data = afLineData;
        chartAF.update();

        // 2. 更新 a-1/m 图表
        let invPoints = dataInvM.map(p => ({ x: p.x, y: p.y }));
        let invLineData = [];
        const regInv = linearRegression(dataInvM);
        if (regInv && dataInvM.length >= 2) {
            const xs = dataInvM.map(p => p.x);
            const minX = Math.min(...xs);
            const maxX = Math.max(...xs);
            const pad = (maxX - minX) * 0.1 || 0.2;
            const x1 = Math.max(0, minX - pad);
            const x2 = maxX + pad;
            invLineData = [
                { x: x1, y: regInv.slope * x1 + regInv.intercept },
                { x: x2, y: regInv.slope * x2 + regInv.intercept }
            ];
            document.getElementById('invMFormula').innerHTML = 
                `拟合: a = ${regInv.slope.toFixed(3)} (1/m) + ${regInv.intercept.toFixed(3)}`;
        } else {
            document.getElementById('invMFormula').innerHTML = '暂无数据或点太少';
        }

        chartInvM.data.datasets[0].data = invPoints;
        chartInvM.data.datasets[1].data = invLineData;
        chartInvM.update();
    }

    // --- 绘图按钮: 记录当前实验点 ---
    function recordCurrentPoint() {
        const { M, F, a } = getCurrentParams();
        // 添加到 a-F 数据
        dataAF.push({ x: F, y: a });
        // 添加到 a-1/m 数据 (1/M 作为横坐标)
        dataInvM.push({ x: 1 / M, y: a });

        updateCharts();
    }

    // --- 重置功能: 清空数据, 停止动画, 复位小车 ---
    function resetAll() {
        // 停止动画
        if (animFrame) {
            cancelAnimationFrame(animFrame);
            animFrame = null;
        }
        animActive = false;
        carX = 60;
        carV = 0;

        // 清空数据
        dataAF = [];
        dataInvM = [];

        // 重置图表
        updateCharts();

        // 重绘静态小车
        drawCanvas(0);

        // 显示当前数据 (滑块值不变)
        updateDataDisplay();
    }

    // --- 绘制小车和轨道 (动画帧也会调用) ---
    function drawCanvas(offsetTime) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 画轨道
        ctx.beginPath();
        ctx.strokeStyle = '#3b2f1f';
        ctx.lineWidth = 8;
        ctx.shadowColor = '#6d5c4c';
        ctx.shadowBlur = 10;
        ctx.moveTo(20, 140);
        ctx.lineTo(680, 140);
        ctx.stroke();
        ctx.shadowBlur = 0;
        // 轨道阴影
        ctx.beginPath();
        ctx.strokeStyle = '#b0a18b';
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 16]);
        ctx.moveTo(20, 144);
        ctx.lineTo(680, 144);
        ctx.stroke();
        ctx.setLineDash([]);

        // 打点计时器 (静态示意)
        ctx.fillStyle = '#4a3e32';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#2d241c';
        ctx.beginPath();
        ctx.rect(30, 110, 40, 25);
        ctx.fill();
        ctx.fillStyle = '#cdb38c';
        ctx.font = 'bold 14px monospace';
        ctx.fillText('⏱️', 40, 132);
        // 纸带小点
        ctx.fillStyle = '#f5deb3';
        for (let i=0; i<6; i++) {
            ctx.beginPath();
            ctx.arc(80 + i*12, 135, 2, 0, 2*Math.PI);
            ctx.fill();
        }

        // 画小车 (基于carX)
        ctx.shadowColor = '#1f3a4b';
        ctx.shadowBlur = 12;
        // 车身
        ctx.fillStyle = '#e63946';
        ctx.beginPath();
        ctx.roundRect(carX, 100, 70, 30, 12);
        ctx.fill();
        // 车顶
        ctx.fillStyle = '#f4a261';
        ctx.beginPath();
        ctx.roundRect(carX+10, 75, 50, 25, 8);
        ctx.fill();
        // 车轮
        ctx.fillStyle = '#2b2b2b';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(carX+15, 130, 10, 0, 2*Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(carX+55, 130, 10, 0, 2*Math.PI);
        ctx.fill();
        ctx.shadowBlur = 0;
        // 车窗
        ctx.fillStyle = '#a8dadc';
        ctx.beginPath();
        ctx.rect(carX+25, 82, 20, 12);
        ctx.fill();

        // 速度、加速度文本
        ctx.font = 'bold 12px "Segoe UI"';
        ctx.fillStyle = '#0a2f44';
        ctx.fillText('小车', carX+15, 95);
    }

    // 辅助 roundRect
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
        return this;
    };

    // --- 动画循环 ---
    function animate(timestamp) {
        if (!animActive) return;
        const { a } = getCurrentParams();   // 当前加速度 (m/s²)

        // 欧拉更新 (dt 假设固定每帧~16ms, 简化: 用固定步长保持稳定)
        // 为了平滑，按帧率大约60fps, dt=0.0167s  -> 速度变化 v += a * dt
        carV += a * 0.016;   // 速度 m/s
        // 限制最高速度 3 m/s 动画
        if (carV > 3) carV = 3;
        if (carV < -0.5) carV = -0.5; // 防止反向

        // 更新位置 (像素) : 速度 (m/s) * 像素每米 * 时间因子 (这里0.016融合在增量)
        carX += carV * PIXEL_PER_METER * 0.016;

        // 边界处理 (反弹/重置)
        if (carX > MAX_X) {
            carX = MIN_X;
            carV = 0;
        }
        if (carX < MIN_X) {
            carX = MIN_X;
            carV = 0;
        }

        drawCanvas();

        // 继续动画
        animFrame = requestAnimationFrame(animate);
    }

    // --- 初始化图表 ---
    function initCharts() {
        const afCtx = document.getElementById('chartAF').getContext('2d');
        const invCtx = document.getElementById('chartInvM').getContext('2d');

        chartAF = new Chart(afCtx, {
            type: 'scatter',
            data: {
                datasets: [
                    { label: '实验数据', data: [], backgroundColor: '#d64045', pointRadius: 6 },
                    { label: '拟合直线', data: [], type: 'line', borderColor: '#1e5b9c', borderWidth: 3, fill: false, showLine: true, pointRadius: 0, tension: 0 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { x: { title: { display: true, text: '拉力 F (N)' } }, y: { title: { display: true, text: '加速度 a (m/s²)' }, beginAtZero: true } }
            }
        });

        chartInvM = new Chart(invCtx, {
            type: 'scatter',
            data: {
                datasets: [
                    { label: '实验数据', data: [], backgroundColor: '#2a6f97', pointRadius: 6 },
                    { label: '拟合直线', data: [], type: 'line', borderColor: '#d45d1e', borderWidth: 3, fill: false, showLine: true, pointRadius: 0, tension: 0 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { x: { title: { display: true, text: '1/M (kg⁻¹)' } }, y: { title: { display: true, text: '加速度 a (m/s²)' }, beginAtZero: true } }
            }
        });
    }

    // --- 事件绑定 ---
    function bindEvents() {
        // 滑块更新显示
        massSlider.addEventListener('input', () => { updateDataDisplay(); drawCanvas(); });
        weightSlider.addEventListener('input', () => { updateDataDisplay(); drawCanvas(); });
        frictionSlider.addEventListener('input', () => { updateDataDisplay(); drawCanvas(); });

        // 开始动画
        startBtn.addEventListener('click', () => {
            if (!animActive) {
                animActive = true;
                animate();
            }
        });

        // 绘图
        plotBtn.addEventListener('click', () => {
            recordCurrentPoint();
        });

        // 重置
        resetBtn.addEventListener('click', () => {
            resetAll();
        });
    }

    // 初次调用
    function init() {
        initCharts();
        bindEvents();
        updateDataDisplay();
        drawCanvas();
    }

    init();
})();
</script>
</body>
</html>
