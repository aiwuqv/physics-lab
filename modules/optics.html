<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光学 - 高中物理虚拟仿真实验室</title>
<style>
:root{
  --bg-primary:#08101d;
  --color-white:#fff;
  --color-text:#c8d6e5;
  --color-text-dim:#7890a3;
  --glass-bg:rgba(255,255,255,0.06);
  --glass-bg-hover:rgba(255,255,255,0.1);
  --glass-border:rgba(255,255,255,0.12);
  --radius:14px;
  --transition:0.35s cubic-bezier(.25,.8,.25,1);
  --font-main:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  --font-mono:"SF Mono","Fira Code","Consolas",monospace;
  --mc:#00e676;
  --mcr:0,230,118;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-main);
  background:
    radial-gradient(circle at 18% 18%,rgba(0,230,118,.10),transparent 26%),
    radial-gradient(circle at 82% 12%,rgba(0,212,255,.08),transparent 22%),
    radial-gradient(circle at 50% 82%,rgba(123,47,247,.05),transparent 28%),
    var(--bg-primary);
  color:var(--color-text);
  line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
}
a{text-decoration:none;color:inherit}

/* 星空背景 */
.stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.s{
  position:absolute;
  border-radius:50%;
  background:#fff;
  animation:sf linear infinite;
}
@keyframes sf{
  0%{transform:translateY(0) translateX(0);opacity:0}
  10%{opacity:var(--o,.5)}
  90%{opacity:var(--o,.5)}
  100%{transform:translateY(-100vh) translateX(var(--d,20px));opacity:0}
}
.s:nth-child(1){width:2px;height:2px;left:5%;top:90%;--o:.6;--d:15px;animation-duration:25s}
.s:nth-child(2){width:3px;height:3px;left:14%;top:85%;--o:.4;--d:-20px;animation-duration:30s;animation-delay:2s}
.s:nth-child(3){width:1px;height:1px;left:22%;top:95%;--o:.8;--d:10px;animation-duration:20s;animation-delay:1s}
.s:nth-child(4){width:2px;height:2px;left:30%;top:80%;--o:.5;--d:-15px;animation-duration:28s;animation-delay:3s}
.s:nth-child(5){width:4px;height:4px;left:38%;top:92%;--o:.3;--d:25px;animation-duration:35s;animation-delay:.5s}
.s:nth-child(6){width:1px;height:1px;left:46%;top:88%;--o:.7;--d:-10px;animation-duration:22s;animation-delay:4s}
.s:nth-child(7){width:3px;height:3px;left:54%;top:96%;--o:.4;--d:18px;animation-duration:32s;animation-delay:1.5s}
.s:nth-child(8){width:2px;height:2px;left:62%;top:82%;--o:.6;--d:-22px;animation-duration:26s;animation-delay:2.5s}
.s:nth-child(9){width:1px;height:1px;left:70%;top:91%;--o:.9;--d:12px;animation-duration:18s;animation-delay:.8s}
.s:nth-child(10){width:3px;height:3px;left:78%;top:87%;--o:.35;--d:-16px;animation-duration:33s;animation-delay:3.5s}
.s:nth-child(11){width:2px;height:2px;left:86%;top:94%;--o:.55;--d:20px;animation-duration:27s;animation-delay:1.2s}
.s:nth-child(12){width:1px;height:1px;left:94%;top:83%;--o:.75;--d:-14px;animation-duration:21s;animation-delay:4.5s}
.s:nth-child(13){width:2px;height:2px;left:10%;top:76%;--o:.5;--d:22px;animation-duration:29s;animation-delay:1.7s}
.s:nth-child(14){width:3px;height:3px;left:50%;top:78%;--o:.35;--d:-18px;animation-duration:34s;animation-delay:3.2s}
.s:nth-child(15){width:1px;height:1px;left:66%;top:98%;--o:.85;--d:8px;animation-duration:19s;animation-delay:5s}

/* 导航栏 */
.header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(8,16,29,.88);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:0 24px;
  box-shadow:0 8px 30px rgba(0,0,0,.35);
}
.header-inner{
  max-width:1400px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:68px;
}
.back-btn{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--color-text);
  font-size:14px;
  transition:var(--transition);
  padding:8px 16px;
  border-radius:10px;
}
.back-btn:hover{
  color:var(--color-white);
  background:rgba(255,255,255,.06);
}
.back-arrow{display:inline-block;transition:transform .3s}
.back-btn:hover .back-arrow{transform:translateX(-3px)}
.header-title{
  font-size:16px;
  font-weight:700;
  color:var(--color-white);
  letter-spacing:.4px;
}
.header-count{
  font-size:13px;
  color:var(--mc);
  font-family:var(--font-mono);
  padding:5px 12px;
  border-radius:50px;
  background:rgba(var(--mcr),.14);
  border:1px solid rgba(var(--mcr),.22);
  box-shadow:0 0 18px rgba(var(--mcr),.12);
}

/* 页面头部 */
.page-hero{
  padding:72px 24px 44px;
  text-align:center;
  position:relative;
  z-index:1;
}
.page-hero::before{
  content:'';
  position:absolute;
  left:50%;
  top:-40px;
  width:680px;
  height:680px;
  transform:translateX(-50%);
  background:radial-gradient(circle,rgba(var(--mcr),.12),transparent 68%);
  pointer-events:none;
}
.page-hero-icon{
  width:86px;
  height:86px;
  border-radius:22px;
  background:linear-gradient(135deg,rgba(var(--mcr),.16),rgba(var(--mcr),.06));
  border:1px solid rgba(var(--mcr),.22);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 22px;
  font-size:38px;
  box-shadow:0 0 28px rgba(var(--mcr),.12);
}
.page-title{
  font-size:clamp(30px,5vw,52px);
  font-weight:900;
  color:var(--color-white);
  margin-bottom:8px;
  text-shadow:
    0 0 12px rgba(var(--mcr),.5),
    0 0 36px rgba(var(--mcr),.2),
    0 0 72px rgba(var(--mcr),.08),
    0 2px 0 rgba(0,100,80,.7),
    0 6px 18px rgba(0,0,0,.45);
  animation:titleGlow 4s ease-in-out infinite;
}
@keyframes titleGlow{
  0%,100%{filter:brightness(1)}
  50%{filter:brightness(1.12)}
}
.page-title-en{
  font-size:clamp(14px,2vw,18px);
  color:var(--mc);
  font-family:var(--font-mono);
  margin-bottom:16px;
  letter-spacing:1px;
}
.page-desc{
  font-size:15px;
  color:var(--color-text-dim);
  max-width:720px;
  margin:0 auto 28px;
}

/* 搜索框 */
.search-wrap{
  max-width:520px;
  margin:0 auto;
  position:relative;
  z-index:1;
}
.search-wrap input{
  width:100%;
  padding:13px 20px 13px 46px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:50px;
  color:var(--color-white);
  font-size:15px;
  font-family:var(--font-main);
  outline:none;
  transition:var(--transition);
}
.search-wrap input::placeholder{color:var(--color-text-dim)}
.search-wrap input:focus{
  border-color:var(--mc);
  box-shadow:0 0 26px rgba(var(--mcr),.15);
}
.search-wrap .si{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  height:18px;
}
.search-wrap .si::before{
  content:'';
  position:absolute;
  width:12px;
  height:12px;
  border:2px solid var(--color-text-dim);
  border-radius:50%;
  top:0;
  left:0;
}
.search-wrap .si::after{
  content:'';
  position:absolute;
  width:6px;
  height:2px;
  background:var(--color-text-dim);
  bottom:1px;
  right:0;
  transform:rotate(45deg);
  border-radius:1px;
}

/* 子分类标签 */
.sub-tags{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin:24px auto 0;
  max-width:860px;
  position:relative;
  z-index:1;
}
.sub-tag{
  padding:7px 16px;
  border-radius:50px;
  font-size:13px;
  cursor:pointer;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  color:var(--color-text);
  transition:var(--transition);
  user-select:none;
}
.sub-tag:hover{
  background:rgba(255,255,255,.09);
  color:var(--color-white);
  transform:translateY(-1px);
}
.sub-tag.active{
  background:rgba(var(--mcr),.16);
  border-color:rgba(var(--mcr),.36);
  color:var(--mc);
  box-shadow:0 0 20px rgba(var(--mcr),.15);
}

/* 实验卡片 */
.grid-section{
  max-width:1400px;
  margin:0 auto;
  padding:38px 24px 64px;
  position:relative;
  z-index:1;
}
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}
.card{
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.035));
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);
  padding:18px 18px 20px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  transition:transform .35s,box-shadow .35s,background .35s,border-color .35s;
  position:relative;
  overflow:hidden;
  opacity:0;
  transform:translateY(20px);
  min-height:240px;
}
.card::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  padding:1px;
  background:linear-gradient(135deg,rgba(var(--mcr),.22),rgba(0,212,255,.08),rgba(123,47,247,.06));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:.5;
  pointer-events:none;
}
.card.visible{opacity:1;transform:translateY(0)}
.card.hidden{display:none}
.card:hover{
  transform:translateY(-8px);
  background:rgba(255,255,255,.09);
  box-shadow:0 16px 36px rgba(0,0,0,.28),0 0 0 1px rgba(var(--mcr),.18);
  border-color:rgba(var(--mcr),.22);
}
.card-seq{
  position:absolute;
  top:14px;
  left:16px;
  font-size:12px;
  font-family:var(--font-mono);
  color:rgba(255,255,255,.22);
  font-weight:700;
  letter-spacing:.5px;
  z-index:2;
}
.card-new{
  position:absolute;
  top:14px;
  right:16px;
  font-size:10px;
  font-weight:800;
  color:#08101d;
  background:linear-gradient(135deg,#00e676,#00d4ff);
  padding:2px 8px;
  border-radius:6px;
  letter-spacing:.5px;
  z-index:2;
}

/* 缩略图 */
.card-thumb{
  width:100%;
  height:110px;
  border-radius:12px;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
.card-thumb::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,transparent 35%,rgba(255,255,255,.08) 50%,transparent 65%);
  background-size:220% 220%;
  animation:shimmer 4.5s ease-in-out infinite;
}
@keyframes shimmer{
  0%,100%{background-position:180% 0}
  50%{background-position:-180% 0}
}
.card-thumb-icon{
  font-size:42px;
  z-index:1;
  filter:drop-shadow(0 4px 14px rgba(0,0,0,.4));
  transition:transform .35s ease;
}
.card:hover .card-thumb-icon{
  transform:scale(1.14) rotate(-4deg);
}

/* 子分类缩略图颜色 */
.card[data-sub="折射与反射"] .card-thumb{background:linear-gradient(135deg,rgba(0,212,255,.14),rgba(255,255,255,.04))}
.card[data-sub="干涉"] .card-thumb{background:linear-gradient(135deg,rgba(123,47,247,.14),rgba(255,255,255,.04))}
.card[data-sub="衍射"] .card-thumb{background:linear-gradient(135deg,rgba(255,107,53,.12),rgba(255,255,255,.04))}
.card[data-sub="偏振与应用"] .card-thumb{background:linear-gradient(135deg,rgba(0,230,118,.14),rgba(255,255,255,.04))}

.card-sub{
  display:inline-block;
  padding:3px 10px;
  border-radius:50px;
  font-size:11px;
  font-weight:700;
  margin-bottom:12px;
  align-self:flex-start;
  margin-left:28px;
  background:rgba(var(--mcr),.14);
  color:var(--mc);
  border:1px solid rgba(var(--mcr),.16);
}
.card-title{
  font-size:16px;
  font-weight:700;
  color:var(--color-white);
  margin-bottom:18px;
  flex-grow:1;
  line-height:1.5;
  letter-spacing:.2px;
  text-shadow:0 1px 0 rgba(0,0,0,.35);
}
.card-btn{
  font-size:13px;
  color:var(--color-text-dim);
  transition:var(--transition);
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:600;
}
.card:hover .card-btn{color:var(--mc)}
.card-btn .arr{transition:transform .3s;display:inline-block}
.card:hover .card-btn .arr{transform:translateX(4px)}

/* 波纹效果 */
.ripple-circle{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.5) 0%,rgba(255,255,255,.16) 40%,transparent 72%);
  transform:scale(0);
  animation:rippleExpand .6s ease-out forwards;
  pointer-events:none;
  z-index:10;
}
@keyframes rippleExpand{
  to{transform:scale(4);opacity:0}
}

/* 无结果 */
.no-res{
  text-align:center;
  padding:60px 24px;
  color:var(--color-text-dim);
  font-size:18px;
  display:none;
  position:relative;
  z-index:1;
}
.no-res.show{display:block}

/* 回到顶部 */
.btt{
  position:fixed;
  bottom:32px;
  right:32px;
  width:48px;
  height:48px;
  border-radius:50%;
  background:rgba(var(--mcr),.18);
  border:1px solid rgba(var(--mcr),.28);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99;
  opacity:0;
  visibility:hidden;
  transform:translateY(20px);
  transition:var(--transition);
  box-shadow:0 8px 30px rgba(0,0,0,.2);
}
.btt.visible{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
}
.btt:hover{
  background:rgba(var(--mcr),.3);
  box-shadow:0 0 20px rgba(var(--mcr),.25);
}
.btt::before{
  content:'';
  width:10px;
  height:10px;
  border-top:2px solid var(--mc);
  border-left:2px solid var(--mc);
  transform:rotate(45deg) translateY(3px);
}

/* 页脚 */
.footer{
  position:relative;
  z-index:1;
  text-align:center;
  padding:40px 24px;
  border-top:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.16));
}
.footer p{
  color:var(--color-text-dim);
  font-size:13px;
  margin-bottom:6px;
}
.footer a{
  color:var(--mc);
  transition:var(--transition);
}
.footer a:hover{opacity:.8}

/* 响应式 */
@media(max-width:1199px){
  .grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:767px){
  .header-inner{
    height:auto;
    min-height:64px;
    padding:10px 0;
    gap:10px;
    flex-wrap:wrap;
  }
  .header-title{display:none}
  .page-hero{padding:42px 24px 28px}
  .grid{grid-template-columns:1fr}
  .card{min-height:auto}
  .btt{bottom:20px;right:20px;width:42px;height:42px}
}
</style>
</head>

var grid = document.getElementById('grid');
var searchInput = document.getElementById('searchInput');
var noRes = document.getElementById('noRes');

experiments.forEach(function(exp, i){
  var a = document.createElement('a');
  a.href = '../experiments/' + exp.name + '.html';
  a.className = 'card';
  a.setAttribute('data-name', exp.name);
  a.setAttribute('data-sub', exp.sub);

  var icon = thumbIcons[exp.name] || '💡';
  var newBadge = exp.isNew ? '<span class="card-new">NEW</span>' : '';

  a.innerHTML =
    '<span class="card-seq">' + String(i+1).padStart(2,'0') + '</span>' +
    newBadge +
    '<div class="card-thumb"><span class="card-thumb-icon">' + icon + '</span></div>' +
    '<span class="card-sub">' + exp.sub + '</span>' +
    '<div class="card-title">' + exp.name + '</div>' +
    '<div class="card-btn">开始实验 <span class="arr">→</span></div>';

  grid.appendChild(a);
});

var allCards = document.querySelectorAll('.card');

function filter(){
  var kw = searchInput.value.trim().toLowerCase();
  var as = document.querySelector('.sub-tag.active').getAttribute('data-sub');
  var c = 0;

  allCards.forEach(function(card){
    var n = card.getAttribute('data-name').toLowerCase();
    var s = card.getAttribute('data-sub');
    var show = (!kw || n.indexOf(kw)!==-1) && (as==='all' || s===as);
    if(show){card.classList.remove('hidden');c++}else{card.classList.add('hidden')}
  });

  noRes.classList.toggle('show', c===0);
}

searchInput.addEventListener('input', filter);
document.querySelectorAll('.sub-tag').forEach(function(tag){
  tag.addEventListener('click', function(){
    document.querySelectorAll('.sub-tag').forEach(function(t){t.classList.remove('active')});
    tag.classList.add('active');
    filter();
  });
});

var cObs = new IntersectionObserver(function(entries){
  entries.forEach(function(e){
    if(e.isIntersecting){
      var c = e.target;
      var sibs = Array.from(c.parentElement.querySelectorAll('.card:not(.hidden)'));
      setTimeout(function(){c.classList.add('visible')}, Math.min(sibs.indexOf(c),8)*50);
      cObs.unobserve(c);
    }
  });
},{rootMargin:'0px 0px -30px 0px',threshold:.05});
allCards.forEach(function(c){cObs.observe(c)});

var audioCtx = null;
function playClickSound(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(900, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(540, audioCtx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.11, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.18);
  }catch(err){}
}

document.querySelectorAll('.card').forEach(function(card){
  card.addEventListener('click', function(e){
    var rect = card.getBoundingClientRect();
    var ripple = document.createElement('span');
    ripple.className = 'ripple-circle';
    var size = Math.max(rect.width, rect.height);
    ripple.style.width = size + 'px';
    ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
    card.appendChild(ripple);
    setTimeout(function(){ ripple.remove(); }, 600);
    playClickSound();
  });
});

var btt = document.getElementById('btt');
window.addEventListener('scroll',function(){
  btt.classList.toggle('visible', window.scrollY > 400);
},{passive:true});
btt.addEventListener('click',function(){
  window.scrollTo({top:0,behavior:'smooth'});
});
</script>
</body>
