<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原子物理 - 高中物理虚拟仿真实验室</title>
<style>
:root{
  --bg-primary:#0a1628;
  --color-white:#fff;
  --color-text:#c8d6e5;
  --color-text-dim:#6b7b8d;
  --glass-bg:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.1);
  --glass-bg-hover:rgba(255,255,255,0.1);
  --radius:12px;
  --transition:0.3s ease;
  --font-main:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  --font-mono:"SF Mono","Fira Code","Consolas",monospace;
  --mc:#ffd700;
  --mcr:255,215,0
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-main);background:var(--bg-primary);color:var(--color-text);line-height:1.6;overflow-x:hidden;min-height:100vh}
a{text-decoration:none;color:inherit}

/* ====== 星空背景 ====== */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.s{position:absolute;border-radius:50%;background:#fff;animation:sf linear infinite}
@keyframes sf{
  0%{transform:translateY(0) translateX(0);opacity:0}
  10%{opacity:var(--o,.5)}
  90%{opacity:var(--o,.5)}
  100%{transform:translateY(-100vh) translateX(var(--d,20px));opacity:0}
}
.s:nth-child(1){width:2px;height:2px;left:5%;top:90%;--o:.6;--d:15px;animation-duration:25s}
.s:nth-child(2){width:3px;height:3px;left:14%;top:85%;--o:.4;--d:-20px;animation-duration:30s;animation-delay:2s}
.s:nth-child(3){width:1px;height:1px;left:22%;top:95%;--o:.8;--d:10px;animation-duration:20s;animation-delay:1s}
.s:nth-child(4){width:2px;height:2px;left:30%;top:80%;--o:.5;--d:-15px;animation-duration:28s;animation-delay:3s}
.s:nth-child(5){width:4px;height:4px;left:38%;top:92%;--o:.3;--d:25px;animation-duration:35s;animation-delay:.5s}
.s:nth-child(6){width:1px;height:1px;left:46%;top:88%;--o:.7;--d:-10px;animation-duration:22s;animation-delay:4s}
.s:nth-child(7){width:3px;height:3px;left:54%;top:96%;--o:.4;--d:18px;animation-duration:32s;animation-delay:1.5s}
.s:nth-child(8){width:2px;height:2px;left:62%;top:82%;--o:.6;--d:-22px;animation-duration:26s;animation-delay:2.5s}
.s:nth-child(9){width:1px;height:1px;left:70%;top:91%;--o:.9;--d:12px;animation-duration:18s;animation-delay:.8s}
.s:nth-child(10){width:3px;height:3px;left:78%;top:87%;--o:.35;--d:-16px;animation-duration:33s;animation-delay:3.5s}
.s:nth-child(11){width:2px;height:2px;left:86%;top:94%;--o:.55;--d:20px;animation-duration:27s;animation-delay:1.2s}
.s:nth-child(12){width:1px;height:1px;left:94%;top:83%;--o:.75;--d:-14px;animation-duration:21s;animation-delay:4.5s}
.s:nth-child(13){width:2px;height:2px;left:10%;top:76%;--o:.5;--d:22px;animation-duration:29s;animation-delay:1.7s}
.s:nth-child(14){width:3px;height:3px;left:50%;top:78%;--o:.35;--d:-18px;animation-duration:34s;animation-delay:3.2s}
.s:nth-child(15){width:1px;height:1px;left:66%;top:98%;--o:.85;--d:8px;animation-duration:19s;animation-delay:5s}

/* ====== 顶部导航栏 ====== */
.header{position:sticky;top:0;z-index:100;background:rgba(10,22,40,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);padding:0 24px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--color-text);font-size:14px;transition:var(--transition);padding:8px 16px;border-radius:8px}
.back-btn:hover{color:var(--color-white);background:var(--glass-bg)}
.back-arrow{display:inline-block;transition:transform .3s}
.back-btn:hover .back-arrow{transform:translateX(-3px)}
.header-title{font-size:16px;font-weight:600;color:var(--color-white)}
.header-count{font-size:13px;color:var(--mc);font-family:var(--font-mono);padding:4px 12px;border-radius:50px;background:rgba(var(--mcr),.15)}

/* ====== 页面头部英雄区 ====== */
.page-hero{padding:60px 24px 40px;text-align:center;position:relative;z-index:1}
.page-hero-icon{width:80px;height:80px;border-radius:20px;background:rgba(var(--mcr),.15);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px}
.page-title{font-size:clamp(28px,5vw,48px);font-weight:800;color:var(--color-white);margin-bottom:8px}
.page-title-en{font-size:clamp(14px,2vw,18px);color:var(--mc);font-family:var(--font-mono);margin-bottom:16px}
.page-desc{font-size:15px;color:var(--color-text-dim);max-width:700px;margin:0 auto 32px}

/* ====== 搜索框 ====== */
.search-wrap{max-width:500px;margin:0 auto;position:relative;z-index:1}
.search-wrap input{width:100%;padding:12px 20px 12px 44px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:50px;color:var(--color-white);font-size:15px;font-family:var(--font-main);outline:none;transition:var(--transition)}
.search-wrap input::placeholder{color:var(--color-text-dim)}
.search-wrap input:focus{border-color:var(--mc);box-shadow:0 0 20px rgba(var(--mcr),.15)}
.search-wrap .si{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px}
.search-wrap .si::before{content:'';position:absolute;width:12px;height:12px;border:2px solid var(--color-text-dim);border-radius:50%;top:0;left:0}
.search-wrap .si::after{content:'';position:absolute;width:6px;height:2px;background:var(--color-text-dim);bottom:1px;right:0;transform:rotate(45deg);border-radius:1px}

/* ====== 子分类标签 ====== */
.sub-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:24px auto 0;max-width:800px;position:relative;z-index:1}
.sub-tag{padding:6px 16px;border-radius:50px;font-size:13px;cursor:pointer;background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--color-text);transition:var(--transition);user-select:none}
.sub-tag:hover{background:var(--glass-bg-hover);color:var(--color-white)}
.sub-tag.active{background:rgba(var(--mcr),.15);border-color:var(--mc);color:var(--mc)}

/* ====== 实验卡片网格 ====== */
.grid-section{max-width:1400px;margin:0 auto;padding:40px 24px 60px;position:relative;z-index:1}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{display:flex;flex-direction:column;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius);padding:24px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:transform .3s,box-shadow .3s,background .3s;position:relative;overflow:hidden;opacity:0;transform:translateY(20px)}
.card.visible{opacity:1;transform:translateY(0)}
.card.hidden{display:none}
.card:hover{transform:translateY(-6px);background:var(--glass-bg-hover);box-shadow:0 8px 32px rgba(var(--mcr),.2),0 0 0 1px rgba(var(--mcr),.3)}
.card-seq{position:absolute;top:14px;left:18px;font-size:12px;font-family:var(--font-mono);color:rgba(255,255,255,.2);font-weight:700}
.card-sub{display:inline-block;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600;margin-bottom:14px;align-self:flex-start;margin-left:32px;background:rgba(var(--mcr),.15);color:var(--mc)}
.card-title{font-size:16px;font-weight:600;color:var(--color-white);margin-bottom:18px;flex-grow:1;line-height:1.5}
.card-btn{font-size:13px;color:var(--color-text-dim);transition:var(--transition);display:flex;align-items:center;gap:6px}
.card:hover .card-btn{color:var(--mc)}
.card-btn .arr{transition:transform .3s;display:inline-block}
.card:hover .card-btn .arr{transform:translateX(4px)}

/* ====== 无结果提示 ====== */
.no-res{text-align:center;padding:60px 24px;color:var(--color-text-dim);font-size:18px;display:none;position:relative;z-index:1}
.no-res.show{display:block}

/* ====== 回到顶部 ====== */
.btt{position:fixed;bottom:32px;right:32px;width:48px;height:48px;border-radius:50%;background:rgba(var(--mcr),.2);border:1px solid rgba(var(--mcr),.3);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:99;opacity:0;visibility:hidden;transform:translateY(20px);transition:var(--transition)}
.btt.visible{opacity:1;visibility:visible;transform:translateY(0)}
.btt:hover{background:rgba(var(--mcr),.35);box-shadow:0 0 20px rgba(var(--mcr),.3)}
.btt::before{content:'';width:10px;height:10px;border-top:2px solid var(--mc);border-left:2px solid var(--mc);transform:rotate(45deg) translateY(3px)}

/* ====== 页脚 ====== */
.footer{position:relative;z-index:1;text-align:center;padding:40px 24px;border-top:1px solid var(--glass-border)}
.footer p{color:var(--color-text-dim);font-size:13px;margin-bottom:6px}
.footer a{color:var(--mc);transition:var(--transition)}
.footer a:hover{opacity:.8}

/* ====== 响应式 ====== */
@media(max-width:1199px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:767px){
  .grid{grid-template-columns:1fr}
  .header-title{display:none}
  .page-hero{padding:40px 24px 30px}
  .btt{bottom:20px;right:20px;width:42px;height:42px}
}
</style>
</head>
<body>

<!-- 星空背景 -->
<div class="stars" aria-hidden="true">
  <div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div>
  <div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div>
  <div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div>
</div>

<!-- 顶部导航栏 -->
<header class="header">
  <div class="header-inner">
    <a href="../index.html" class="back-btn"><span class="back-arrow">←</span> 返回主页</a>
    <div class="header-title">原子物理 Atomic Physics</div>
    <span class="header-count">17 个实验</span>
  </div>
</header>

<!-- 页面头部 -->
<section class="page-hero">
  <div class="page-hero-icon">⚛️</div>
  <h1 class="page-title">原子物理学</h1>
  <div class="page-title-en">Atomic Physics</div>
  <p class="page-desc">涵盖原子结构、原子核、量子力学初步、核能等近代物理核心知识</p>
  <div class="search-wrap">
    <div class="si"></div>
    <input type="text" id="searchInput" placeholder="搜索原子物理实验..." aria-label="搜索实验">
  </div>
  <div class="sub-tags" id="subTags">
    <span class="sub-tag active" data-sub="all">全部</span>
    <span class="sub-tag" data-sub="原子结构">原子结构</span>
    <span class="sub-tag" data-sub="量子理论">量子理论</span>
    <span class="sub-tag" data-sub="原子核">原子核</span>
    <span class="sub-tag" data-sub="核能">核能</span>
    <span class="sub-tag" data-sub="粒子与射线">粒子与射线</span>
  </div>
</section>

<!-- 无结果提示 -->
<div class="no-res" id="noRes">🔍 未找到匹配的实验</div>

<!-- 实验卡片网格 -->
<section class="grid-section">
  <div class="grid" id="grid"></div>
</section>

<!-- 回到顶部按钮 -->
<button class="btt" id="btt" aria-label="回到顶部"></button>

<!-- 页脚 -->
<footer class="footer">
  <p><a href="../index.html">← 返回实验室主页</a></p>
  <p>© 2025 高中物理虚拟仿真实验室</p>
</footer>

<script>
/* ====== 实验数据 ====== */
var experiments = [
  {name:'氢原子能级', sub:'原子结构'},
  {name:'α、β、γ射线在磁场中的偏转', sub:'粒子与射线'},
  {name:'四种基本相互作用演示', sub:'粒子与射线'},
  {name:'阴极射线实验', sub:'粒子与射线'},
  {name:'原子核结合能模拟实验', sub:'原子核'},
  {name:'原子核衰变模拟', sub:'原子核'},
  {name:'原子结构模型发展史', sub:'原子结构'},
  {name:'玻尔的原子模型', sub:'原子结构'},
  {name:'电子双缝干涉实验', sub:'量子理论'},
  {name:'电子圆孔衍射实验', sub:'量子理论'},
  {name:'光电效应电路图模拟', sub:'量子理论'},
  {name:'核反应堆原理模拟实验', sub:'核能'},
  {name:'核聚变演示', sub:'核能'},
  {name:'核裂变链式反应模拟实验', sub:'核能'},
  {name:'康普顿效应', sub:'量子理论'},
  {name:'可见光光谱', sub:'原子结构'},
  {name:'卢瑟福α粒子散射实验', sub:'原子结构'}
];

/* ====== 生成卡片 ====== */
var grid = document.getElementById('grid');
var searchInput = document.getElementById('searchInput');
var noRes = document.getElementById('noRes');

experiments.forEach(function(exp, i) {
  var a = document.createElement('a');
  a.href = '../experiments/' + exp.name + '.html';
  a.className = 'card';
  a.setAttribute('data-name', exp.name);
  a.setAttribute('data-sub', exp.sub);
  a.setAttribute('aria-label', '实验' + String(i + 1).padStart(2, '0') + '：' + exp.name);
  a.innerHTML =
    '<span class="card-seq">' + String(i + 1).padStart(2, '0') + '</span>' +
    '<span class="card-sub">' + exp.sub + '</span>' +
    '<div class="card-title">' + exp.name + '</div>' +
    '<div class="card-btn">开始实验 <span class="arr">→</span></div>';
  grid.appendChild(a);
});

var allCards = document.querySelectorAll('.card');

/* ====== 搜索与筛选 ====== */
function filter() {
  var kw = searchInput.value.trim().toLowerCase();
  var activeSub = document.querySelector('.sub-tag.active').getAttribute('data-sub');
  var count = 0;

  allCards.forEach(function(card) {
    var name = card.getAttribute('data-name').toLowerCase();
    var sub = card.getAttribute('data-sub');
    var matchSearch = !kw || name.indexOf(kw) !== -1;
    var matchSub = activeSub === 'all' || sub === activeSub;

    if (matchSearch && matchSub) {
      card.classList.remove('hidden');
      count++;
    } else {
      card.classList.add('hidden');
    }
  });

  if (count === 0) {
    noRes.classList.add('show');
  } else {
    noRes.classList.remove('show');
  }
}

searchInput.addEventListener('input', filter);

document.querySelectorAll('.sub-tag').forEach(function(tag) {
  tag.addEventListener('click', function() {
    document.querySelectorAll('.sub-tag').forEach(function(t) {
      t.classList.remove('active');
    });
    tag.classList.add('active');
    filter();
  });
});

/* ====== 卡片入场动画 ====== */
var cardObserver = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      var card = entry.target;
      var siblings = Array.from(card.parentElement.querySelectorAll('.card:not(.hidden)'));
      var index = siblings.indexOf(card);
      var delay = Math.min(index, 8) * 50;
      setTimeout(function() {
        card.classList.add('visible');
      }, delay);
      cardObserver.unobserve(card);
    }
  });
}, {
  rootMargin: '0px 0px -30px 0px',
  threshold: 0.05
});

allCards.forEach(function(card) {
  cardObserver.observe(card);
});

/* ====== 回到顶部按钮 ====== */
var btt = document.getElementById('btt');

window.addEventListener('scroll', function() {
  if (window.scrollY > 400) {
    btt.classList.add('visible');
  } else {
    btt.classList.remove('visible');
  }
}, { passive: true });

btt.addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
