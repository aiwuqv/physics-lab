<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>力学 - 高中物理虚拟仿真实验室</title>
<style>
:root {
  --bg-primary: #0a1628;
  --color-blue: #00d4ff;
  --color-purple: #7b2ff7;
  --color-white: #ffffff;
  --color-text: #c8d6e5;
  --color-text-dim: #6b7b8d;
  --glass-bg: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --glass-bg-hover: rgba(255,255,255,0.1);
  --radius: 12px;
  --transition: 0.3s ease;
  --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "SF Mono", "Fira Code", "Consolas", monospace;
  --module-color: #00d4ff;
  --module-color-rgb: 0,212,255;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-main);background:var(--bg-primary);color:var(--color-text);line-height:1.6;overflow-x:hidden;min-height:100vh}
a{text-decoration:none;color:inherit}

/* 星空 */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.s{position:absolute;border-radius:50%;background:#fff;animation:sf linear infinite}
@keyframes sf{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:var(--o,0.5)}90%{opacity:var(--o,0.5)}100%{transform:translateY(-100vh) translateX(var(--d,20px));opacity:0}}
.s:nth-child(1){width:2px;height:2px;left:5%;top:90%;--o:0.6;--d:15px;animation-duration:25s}
.s:nth-child(2){width:3px;height:3px;left:14%;top:85%;--o:0.4;--d:-20px;animation-duration:30s;animation-delay:2s}
.s:nth-child(3){width:1px;height:1px;left:22%;top:95%;--o:0.8;--d:10px;animation-duration:20s;animation-delay:1s}
.s:nth-child(4){width:2px;height:2px;left:30%;top:80%;--o:0.5;--d:-15px;animation-duration:28s;animation-delay:3s}
.s:nth-child(5){width:4px;height:4px;left:38%;top:92%;--o:0.3;--d:25px;animation-duration:35s;animation-delay:.5s}
.s:nth-child(6){width:1px;height:1px;left:46%;top:88%;--o:0.7;--d:-10px;animation-duration:22s;animation-delay:4s}
.s:nth-child(7){width:3px;height:3px;left:54%;top:96%;--o:0.4;--d:18px;animation-duration:32s;animation-delay:1.5s}
.s:nth-child(8){width:2px;height:2px;left:62%;top:82%;--o:0.6;--d:-22px;animation-duration:26s;animation-delay:2.5s}
.s:nth-child(9){width:1px;height:1px;left:70%;top:91%;--o:0.9;--d:12px;animation-duration:18s;animation-delay:.8s}
.s:nth-child(10){width:3px;height:3px;left:78%;top:87%;--o:0.35;--d:-16px;animation-duration:33s;animation-delay:3.5s}
.s:nth-child(11){width:2px;height:2px;left:86%;top:94%;--o:0.55;--d:20px;animation-duration:27s;animation-delay:1.2s}
.s:nth-child(12){width:1px;height:1px;left:94%;top:83%;--o:0.75;--d:-14px;animation-duration:21s;animation-delay:4.5s}
.s:nth-child(13){width:2px;height:2px;left:10%;top:76%;--o:0.5;--d:22px;animation-duration:29s;animation-delay:1.7s}
.s:nth-child(14){width:3px;height:3px;left:50%;top:78%;--o:0.35;--d:-18px;animation-duration:34s;animation-delay:3.2s}
.s:nth-child(15){width:1px;height:1px;left:66%;top:98%;--o:0.85;--d:8px;animation-duration:19s;animation-delay:5s}
.s:nth-child(16){width:2px;height:2px;left:82%;top:75%;--o:0.45;--d:-12px;animation-duration:31s;animation-delay:2.8s}
.s:nth-child(17){width:4px;height:4px;left:34%;top:99%;--o:0.2;--d:16px;animation-duration:40s;animation-delay:.3s}
.s:nth-child(18){width:1px;height:1px;left:42%;top:77%;--o:0.7;--d:-20px;animation-duration:23s;animation-delay:3.9s}
.s:nth-child(19){width:2px;height:2px;left:58%;top:93%;--o:0.6;--d:14px;animation-duration:26s;animation-delay:1.4s}
.s:nth-child(20){width:3px;height:3px;left:90%;top:89%;--o:0.3;--d:-24px;animation-duration:36s;animation-delay:4.2s}

/* 导航栏 */
.header{position:sticky;top:0;z-index:100;background:rgba(10,22,40,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);padding:0 24px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--color-text);font-size:14px;transition:var(--transition);padding:8px 16px;border-radius:8px}
.back-btn:hover{color:var(--color-white);background:var(--glass-bg)}
.back-arrow{display:inline-block;transition:transform .3s}
.back-btn:hover .back-arrow{transform:translateX(-3px)}
.header-title{font-size:16px;font-weight:600;color:var(--color-white)}
.header-count{font-size:13px;color:var(--module-color);font-family:var(--font-mono);padding:4px 12px;border-radius:50px;background:rgba(var(--module-color-rgb),0.15)}

/* 页面头部 */
.page-hero{padding:60px 24px 40px;text-align:center;position:relative;z-index:1}
.page-hero-icon{width:80px;height:80px;border-radius:20px;background:rgba(var(--module-color-rgb),0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;position:relative}
.page-hero-icon::before{content:'';width:40px;height:20px;border:3px solid var(--module-color);border-color:transparent transparent var(--module-color) transparent;border-radius:0 0 50% 50%}
.page-hero-icon::after{content:'';position:absolute;width:10px;height:10px;background:var(--module-color);border-radius:50%;top:18px;right:18px}
.page-title{font-size:clamp(28px,5vw,48px);font-weight:800;color:var(--color-white);margin-bottom:8px}
.page-title-en{font-size:clamp(14px,2vw,18px);color:var(--module-color);font-family:var(--font-mono);margin-bottom:16px}
.page-desc{font-size:15px;color:var(--color-text-dim);max-width:700px;margin:0 auto 32px}

/* 搜索框 */
.search-wrap{max-width:500px;margin:0 auto;position:relative;z-index:1}
.search-wrap input{width:100%;padding:12px 20px 12px 44px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:50px;color:var(--color-white);font-size:15px;font-family:var(--font-main);outline:none;transition:var(--transition)}
.search-wrap input::placeholder{color:var(--color-text-dim)}
.search-wrap input:focus{border-color:var(--module-color);box-shadow:0 0 20px rgba(var(--module-color-rgb),0.15)}
.search-wrap .si{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px}
.search-wrap .si::before{content:'';position:absolute;width:12px;height:12px;border:2px solid var(--color-text-dim);border-radius:50%;top:0;left:0}
.search-wrap .si::after{content:'';position:absolute;width:6px;height:2px;background:var(--color-text-dim);bottom:1px;right:0;transform:rotate(45deg);border-radius:1px}

/* 子分类标签 */
.sub-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:24px auto 0;max-width:800px;position:relative;z-index:1}
.sub-tag{padding:6px 16px;border-radius:50px;font-size:13px;cursor:pointer;background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--color-text);transition:var(--transition);user-select:none}
.sub-tag:hover{background:var(--glass-bg-hover);color:var(--color-white)}
.sub-tag.active{background:rgba(var(--module-color-rgb),0.15);border-color:var(--module-color);color:var(--module-color)}

/* 实验网格 */
.grid-section{max-width:1400px;margin:0 auto;padding:40px 24px 60px;position:relative;z-index:1}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{display:flex;flex-direction:column;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius);padding:24px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:transform .3s,box-shadow .3s,background .3s;position:relative;overflow:hidden;opacity:0;transform:translateY(20px)}
.card.visible{opacity:1;transform:translateY(0)}
.card.hidden{display:none}
.card:hover{transform:translateY(-6px);background:var(--glass-bg-hover);box-shadow:0 8px 32px rgba(var(--module-color-rgb),0.2),0 0 0 1px rgba(var(--module-color-rgb),0.3)}
.card-seq{position:absolute;top:14px;left:18px;font-size:12px;font-family:var(--font-mono);color:rgba(255,255,255,0.2);font-weight:700}
.card-sub{display:inline-block;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600;margin-bottom:14px;align-self:flex-start;margin-left:32px;background:rgba(var(--module-color-rgb),0.15);color:var(--module-color)}
.card-title{font-size:16px;font-weight:600;color:var(--color-white);margin-bottom:18px;flex-grow:1;line-height:1.5}
.card-btn{font-size:13px;color:var(--color-text-dim);transition:var(--transition);display:flex;align-items:center;gap:6px}
.card:hover .card-btn{color:var(--module-color)}
.card-btn .arr{transition:transform .3s;display:inline-block}
.card:hover .card-btn .arr{transform:translateX(4px)}

/* 无结果 */
.no-res{text-align:center;padding:60px 24px;color:var(--color-text-dim);font-size:18px;display:none;position:relative;z-index:1}
.no-res.show{display:block}

/* 回到顶部 */
.btt{position:fixed;bottom:32px;right:32px;width:48px;height:48px;border-radius:50%;background:rgba(var(--module-color-rgb),0.2);border:1px solid rgba(var(--module-color-rgb),0.3);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:99;opacity:0;visibility:hidden;transform:translateY(20px);transition:var(--transition)}
.btt.visible{opacity:1;visibility:visible;transform:translateY(0)}
.btt:hover{background:rgba(var(--module-color-rgb),0.35);box-shadow:0 0 20px rgba(var(--module-color-rgb),0.3)}
.btt::before{content:'';width:10px;height:10px;border-top:2px solid var(--module-color);border-left:2px solid var(--module-color);transform:rotate(45deg) translateY(3px)}

/* 页脚 */
.footer{position:relative;z-index:1;text-align:center;padding:40px 24px;border-top:1px solid var(--glass-border)}
.footer p{color:var(--color-text-dim);font-size:13px;margin-bottom:6px}
.footer a{color:var(--module-color);transition:var(--transition)}
.footer a:hover{opacity:0.8}

/* 响应式 */
@media(max-width:1199px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:767px){
  .grid{grid-template-columns:1fr}
  .header-title{display:none}
  .page-hero{padding:40px 24px 30px}
  .btt{bottom:20px;right:20px;width:42px;height:42px}
}
</style>
</head>
<body>

<div class="stars" aria-hidden="true">
<div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div>
<div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div>
<div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div>
<div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div>
</div>

<header class="header">
  <div class="header-inner">
    <a href="../index.html" class="back-btn"><span class="back-arrow">←</span> 返回主页</a>
    <div class="header-title">力学 Mechanics</div>
    <span class="header-count">31 个实验</span>
  </div>
</header>

<section class="page-hero">
  <div class="page-hero-icon"></div>
  <h1 class="page-title">力学</h1>
  <div class="page-title-en">Mechanics</div>
  <p class="page-desc">涵盖运动学、动力学、功与能、动量、万有引力、机械振动与机械波等核心力学知识</p>
  <div class="search-wrap">
    <div class="si"></div>
    <input type="text" id="searchInput" placeholder="搜索力学实验..." aria-label="搜索实验">
  </div>
  <div class="sub-tags" id="subTags">
    <span class="sub-tag active" data-sub="all">全部</span>
    <span class="sub-tag" data-sub="运动学">运动学</span>
    <span class="sub-tag" data-sub="动力学">动力学</span>
    <span class="sub-tag" data-sub="功与能">功与能</span>
    <span class="sub-tag" data-sub="动量">动量</span>
    <span class="sub-tag" data-sub="万有引力">万有引力</span>
    <span class="sub-tag" data-sub="振动与波">振动与波</span>
    <span class="sub-tag" data-sub="圆周运动">圆周运动</span>
  </div>
</section>

<div class="no-res" id="noRes">🔍 未找到匹配的实验</div>

<section class="grid-section">
  <div class="grid" id="grid"></div>
</section>

<button class="btt" id="btt" aria-label="回到顶部"></button>

<footer class="footer">
  <p><a href="../index.html">← 返回实验室主页</a></p>
  <p>© 2025 高中物理虚拟仿真实验室</p>
</footer>

<script>
var experiments = [
  {name:'太阳系虚拟实验', sub:'万有引力'},
  {name:'卫星变轨', sub:'万有引力'},
  {name:'小船渡河', sub:'运动学'},
  {name:'斜抛', sub:'运动学'},
  {name:'追及相遇问题', sub:'运动学'},
  {name:'自由落体', sub:'运动学'},
  {name:'波的干涉与衍射', sub:'振动与波'},
  {name:'超重与失重', sub:'动力学'},
  {name:'单摆', sub:'振动与波'},
  {name:'弹簧振子简谐运动', sub:'振动与波'},
  {name:'动量定理：冲量与动量变化', sub:'动量'},
  {name:'动能定理', sub:'功与能'},
  {name:'多普勒效应交互程序', sub:'振动与波'},
  {name:'伽利略理想斜面实验', sub:'动力学'},
  {name:'横波与纵波', sub:'振动与波'},
  {name:'胡克定律弹簧转化版', sub:'动力学'},
  {name:'机械能守恒定律', sub:'功与能'},
  {name:'简谐运动', sub:'振动与波'},
  {name:'近地卫星、同步卫星、赤道物体', sub:'万有引力'},
  {name:'静摩擦力与滑动摩擦力对比', sub:'动力学'},
  {name:'开普勒三定律虚拟实验', sub:'万有引力'},
  {name:'力的合成与分解', sub:'动力学'},
  {name:'牛顿第二定律', sub:'动力学'},
  {name:'牛顿第一定律交互式', sub:'动力学'},
  {name:'平抛运动', sub:'运动学'},
  {name:'三种碰撞', sub:'动量'},
  {name:'竖直面内圆周运动：单轨模型与双轨模型', sub:'圆周运动'},
  {name:'竖直面内圆周运动：绳模型与杆模型', sub:'圆周运动'},
  {name:'竖直上抛运动', sub:'运动学'},
  {name:'水平面和斜面的匀速圆周运动', sub:'圆周运动'},
  {name:'水平碰撞', sub:'动量'}
];

var grid = document.getElementById('grid');
var searchInput = document.getElementById('searchInput');
var noRes = document.getElementById('noRes');

experiments.forEach(function(exp, i){
  var a = document.createElement('a');
  a.href = '../experiments/' + exp.name + '.html';
  a.className = 'card';
  a.setAttribute('data-name', exp.name);
  a.setAttribute('data-sub', exp.sub);
  a.setAttribute('aria-label', '实验' + String(i+1).padStart(2,'0') + '：' + exp.name);
  a.innerHTML =
    '<span class="card-seq">' + String(i+1).padStart(2,'0') + '</span>' +
    '<span class="card-sub">' + exp.sub + '</span>' +
    '<div class="card-title">' + exp.name + '</div>' +
    '<div class="card-btn">开始实验 <span class="arr">→</span></div>';
  grid.appendChild(a);
});

var allCards = document.querySelectorAll('.card');

function filter(){
  var kw = searchInput.value.trim().toLowerCase();
  var activeSub = document.querySelector('.sub-tag.active').getAttribute('data-sub');
  var count = 0;
  allCards.forEach(function(c){
    var n = c.getAttribute('data-name').toLowerCase();
    var s = c.getAttribute('data-sub');
    var show = (!kw || n.indexOf(kw) !== -1) && (activeSub === 'all' || s === activeSub);
    if(show){ c.classList.remove('hidden'); count++; }
    else { c.classList.add('hidden'); }
  });
  noRes.classList.toggle('show', count === 0);
}

searchInput.addEventListener('input', filter);

document.querySelectorAll('.sub-tag').forEach(function(tag){
  tag.addEventListener('click', function(){
    document.querySelectorAll('.sub-tag').forEach(function(t){t.classList.remove('active')});
    tag.classList.add('active');
    filter();
  });
});

/* 卡片入场 */
var cObs = new IntersectionObserver(function(entries){
  entries.forEach(function(e){
    if(e.isIntersecting){
      var c = e.target;
      var sibs = Array.from(c.parentElement.querySelectorAll('.card:not(.hidden)'));
      var delay = Math.min(sibs.indexOf(c),8)*50;
      setTimeout(function(){c.classList.add('visible')}, delay);
      cObs.unobserve(c);
    }
  });
},{rootMargin:'0px 0px -30px 0px',threshold:0.05});
allCards.forEach(function(c){cObs.observe(c)});

/* 回到顶部 */
var btt = document.getElementById('btt');
window.addEventListener('scroll',function(){
  btt.classList.toggle('visible', window.scrollY > 400);
},{passive:true});
btt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})});
</script>
</body>
</html>
